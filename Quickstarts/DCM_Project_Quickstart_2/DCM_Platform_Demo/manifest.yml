manifest_version: 2

type: DCM_PROJECT

#---------------------------------------------

default_target: DCM_DEV

targets:
  DCM_DEV:
    account_identifier: MYORG-MY_DEV_ACCOUNT        # update to your account names
    project_name: DCM_DEMO.PROJECTS.DCM_PLATFORM_DEV
    project_owner: DCM_DEVELOPER
    templating_config: DEV
    
  DCM_PROD:
    account_identifier: MYORG-MY_PROD_ACCOUNT
    project_name: DCM_DEMO.PROJECTS.DCM_PLATFORM
    project_owner: DCM_PROD_DEPLOYER
    templating_config: PROD

#---------------------------------------------

templating:
  defaults:
    users: 
      - "GITHUB_ACTIONS_SERVICE_USER"
    wh_size: "X-SMALL"
    
  configurations:
    DEV:
      env_suffix: "_DEV"
      users: 
        - "GITHUB_ACTIONS_SERVICE_USER"
        - "INSERT_YOUR_USER"
      project_owner_role: "DCM_DEVELOPER"
      teams: 
        - name: "Finance"
          raw_access: "READ"
        - name: "Marketing"
          raw_access: "READ"
      
    PROD:
      env_suffix: ""
      project_owner_role: "DCM_DEVELOPER"
      wh_size: "MEDIUM"
      teams:
        - name: "Marketing"
          raw_access: "READ"
        - name: "Finance"
          raw_access: "READ"
        - name: "HR"
          raw_access: "NONE"
        - name: "IT"
          raw_access: "WRITE"
        - name: "Sales"
          raw_access: "NONE"
        - name: "Research"
          raw_access: "NONE"
        - name: "Design"
          raw_access: "NONE"
